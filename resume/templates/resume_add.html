<!DOCTYPE html>
<html lang="en">
{% load static %}
<head>
    <meta charset="UTF-8">
    <title>Resume Builder</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f7fb;
        }

        .form-container {
            max-width: 650px;
            margin: 40px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-dark bg-success">
    <div class="container">
        <a class="navbar-brand" href="{% url 'create_resume' %}">
            Resume Builder
        </a>
    </div>
</nav>

<div class="form-container">
    <h2>Create Resume</h2>

    <form method="POST" action="{% url 'create_resume' %}">
        {% csrf_token %}

        <input class="form-control mb-2" type="text" name="first_name" placeholder="First Name" required>

        <input class="form-control mb-2" type="text" name="last_name" placeholder="Last Name" required>

        <input class="form-control mb-2" type="email" name="email" placeholder="Email" required>

        <input class="form-control mb-2" type="text" name="phone" placeholder="Phone Number">

        <input class="form-control mb-2" type="text" name="linkedin" placeholder="LinkedIn">

        <textarea class="form-control mb-2" name="objective" placeholder="Objective"></textarea>

        <input class="form-control mb-2" type="text" name="skills" placeholder="Skills (comma separated)">

        <input class="form-control mb-2" type="text" name="education" placeholder="Education">

        <input class="form-control mb-2" type="text" name="profile" placeholder="Profile">

        <button class="btn btn-success w-100">Create Resume</button>
    </form>
</div>

</body>
</html>
